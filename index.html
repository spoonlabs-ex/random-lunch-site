<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpoonLabs 랜덤런치 신청</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    :root {
      --bg: #f7efe6;
      --card: rgba(255,255,255,0.82);
      --line: rgba(60, 35, 20, 0.08);
      --text: #2a2118;
      --sub: #7d6c5d;
      --accent: #ff7f73;
      --shadow: 0 18px 40px rgba(80, 47, 25, 0.08);
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 28%),
        radial-gradient(circle at top right, rgba(255,185,140,0.18), transparent 24%),
        linear-gradient(180deg, #fbf3eb 0%, #f5ede5 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 48px;
    }

    .hero-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(60, 35, 20, 0.07);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 14px;
    }

    h1 { margin: 0; font-size: clamp(30px, 4.2vw, 46px); line-height: 1.04; letter-spacing: -0.03em; }
    .hero-desc { margin: 14px 0 0; color: var(--sub); line-height: 1.65; font-size: 15px; }

    .content { display: grid; grid-template-columns: 420px 1fr; gap: 20px; align-items: start; }
    .left-col { display: grid; gap: 16px; position: sticky; top: 20px; }
    
    .panel, .board { 
      background: var(--card); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255,255,255,0.65); 
      box-shadow: var(--shadow); 
      border-radius: var(--radius-xl); 
      padding: 22px; 
    }
    .panel-title, .board-head { margin: 0 0 18px; font-size: 18px; font-weight: 700; padding: 0; }

    .form-grid { display: grid; gap: 16px; }
    .field label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--sub); font-weight: 600; }
    
    .field input, .cancel-input {
      width: 100%; height: 50px; border-radius: 14px; border: 1px solid rgba(60,35,20,0.09);
      background: rgba(255,255,255,0.9); padding: 0 14px; font-size: 15px; 
      font-family: inherit; outline: none; color: var(--text);
    }
    ::placeholder { color: #999; opacity: 1; }

    .topic-desc-box {
      background: rgba(255, 127, 115, 0.05); 
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #7d6c5d;
      margin-top: -4px;
      border: 1px solid rgba(255, 127, 115, 0.1);
    }
    
    .btn-primary {
      width: 100%; border: 0; border-radius: 14px; height: 50px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #ff8d80, #ffb76f); color: #fff;
      box-shadow: 0 14px 22px rgba(255,127,115,0.22); margin-top: 8px;
    }
    .btn-secondary {
      width: 100%; border: 1px solid var(--line); border-radius: 14px; height: 50px; font-weight: 700; cursor: pointer;
      background: rgba(255,255,255,0.85); color: var(--text); font-size: 14px; margin-top: 8px;
    }

    .notice { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .notice.success { color: #2f8a57; }
    .notice.error { color: #d85b5b; }

    .board { overflow: hidden; padding: 22px 0 0 0; } 
    .board-head { padding: 0 22px; }
    #world { width: 100%; height: 500px; background: transparent; position: relative; }
    .lists { padding: 10px 22px 22px; }
    .list-card { background: rgba(255,255,255,0.6); border: 1px solid rgba(60,35,20,0.05); border-radius: 18px; padding: 16px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border-radius: 999px; background: rgba(255,184,107,0.20); color: #6d4d2e; padding: 9px 14px; font-size: 13px; font-weight: 700; }

    @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } .left-col { position: static; } }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <section class="hero-card">
      <div class="eyebrow">SpoonLabs Random Lunch</div>
      <h1>랜덤런치 신청하기🍕</h1>
      <p class="hero-desc">관심 있는 주제를 선택하고 새로운 동료들과 즐거운 점심을 함께하세요!</p>
    </section>

    <section class="content">
      <div class="left-col">
        <div class="panel">
          <div class="panel-title">신청하기</div>
          <div class="form-grid">
            <div class="field">
              <label>닉네임</label>
              <input id="userName" type="text" placeholder="예: Claire" />
            </div>
            <div class="field">
              <label>관심 주제 선택</label>
              <select id="lunchTopic">
                <option value="[러닝] 도심 속 러너들 🏃">[러닝] 도심 속 러너들 🏃</option>
                <option value="[야구] 직관의 설렘부터 방구석 응원까지 ⚾">[야구] 직관의 설렘부터 방구석 응원까지 ⚾</option>
                <option value="[재테크] 월급아 일해라 💰">[재테크] 월급아 일해라 💰</option>
                <option value="[AI] AI 시대 암묵지 관리에 진심인 사람들 🤖">[AI] AI 시대 암묵지 관리에 진심인 사람들 🤖</option>
                <option value="[완전 랜덤] 운명의 데스티니 🎲" selected>[완전 랜덤] 운명의 데스티니 🎲</option>
              </select>
            </div>
            <div id="topicDescription" class="topic-desc-box"></div>
            <button class="btn-primary" id="btnSubmit">신청 완료!</button>
            <div id="submitNotice" class="notice"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">취소하기</div>
          <div class="form-grid">
            <input id="cancelName" class="cancel-input" type="text" placeholder="닉네임을 입력하세요." />
            <button class="btn-secondary" id="btnCancel">신청 취소</button>
            <div id="cancelNotice" class="notice"></div>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="board">
          <div class="board-head">실시간 신청 현황</div>
          <div id="world"></div>
          <div class="lists">
            <div class="list-card">
              <div class="chips" id="soloList"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrbz_FKnZSM3z--nzJwfqCqJ1Dj6F7ygUApyXqcR6n1Dvm4KMFtJdMIjdhE6Pi2K6PZw/exec";
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1_dZyvNXT17ulxe5PsBhkJJ9rdns96V8UHClCm2OMf9g/export?format=csv&gid=0";

    const DESCRIPTIONS = {
      "[러닝] 도심 속 러너들 🏃": "숨이 턱 끝까지 차오르는 짜릿한 해방감을 즐기는 프로 러너부터, 이제 막 운동화를 신고 현관문을 나서려는 러닝 초보까지! 러닝 꿀팁과 건강한 에너지를 나누는 활력 충전 런치",
      "[야구] 직관의 설렘부터 방구석 응원까지 ⚾": "퇴근길 야구장으로 달려가는 열정파 팬부터, 편하게 집에서 챙겨보는 방구석 응원러까지! 응원하는 구단은 달라도 야구 특유의 뜨거운 열정과 직관의 설렘을 나누며 하나 되는 도파민 런치",
      "[재테크] 월급아 일해라 💰": "주식, 부동산, 예적금부터 소소한 짠테크 꿀팁까지! 자본주의 사회에서 살아남기 위한 각자의 투자 소신 Py와 인사이트를 허심탄회하게 나누는 런치 (투자 권유가 아닌 경험 공유 중심!)",
      "[AI] AI 시대 암묵지 관리에 진심인 사람들 🤖": "경험과 직관에서 나오는 암묵지는 여전히 사람만의 강력한 무기! AI 도구 활용법부터 나만의 실무 노하우를 어떻게 자산으로 만들고 공유할지 함께 탐구하는 인사이트 가득한 런치",
      "[완전 랜덤] 운명의 데스티니 🎲": "위 네 가지 항목에 해당하지 않는, 또는 완전한 랜덤 조합을 원하는 구성원들이 함께하는 런치"
    };

    const FOOD_EMOJIS = ["🍔","🍕","🍣","🍜","🥗","🌮","🍙","🥪","🍗","🍤","🍩","🍪","🍎","🍊","🍰"];

    let engine, render, runner, worldWidth, worldHeight;
    let dropBodies = [];

    const els = {
      userName: document.getElementById("userName"),
      lunchTopic: document.getElementById("lunchTopic"),
      topicDescription: document.getElementById("topicDescription"),
      btnSubmit: document.getElementById("btnSubmit"),
      submitNotice: document.getElementById("submitNotice"),
      cancelName: document.getElementById("cancelName"),
      btnCancel: document.getElementById("btnCancel"),
      cancelNotice: document.getElementById("cancelNotice"),
      world: document.getElementById("world"),
      soloList: document.getElementById("soloList")
    };

    function updateDescription() {
      const selected = els.lunchTopic.value;
      els.topicDescription.textContent = DESCRIPTIONS[selected] || "";
    }

    function initMatter() {
      const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
      worldWidth = els.world.clientWidth;
      worldHeight = els.world.clientHeight;
      engine = Engine.create();
      render = Render.create({
        element: els.world, engine,
        options: { width: worldWidth, height: worldHeight, wireframes: false, background: "transparent" }
      });
      const floor = Bodies.rectangle(worldWidth/2, worldHeight+20, worldWidth+100, 40, { isStatic: true });
      const leftWall = Bodies.rectangle(-20, worldHeight/2, 40, worldHeight, { isStatic: true });
      const rightWall = Bodies.rectangle(worldWidth+20, worldHeight/2, 40, worldHeight, { isStatic: true });
      Composite.add(engine.world, [floor, leftWall, rightWall]);
      
      const mouseConstraint = MouseConstraint.create(engine, {
        mouse: Mouse.create(render.canvas),
        constraint: { stiffness: 0.2, render: { visible: false } }
      });
      Composite.add(engine.world, mouseConstraint);
      Render.run(render);
      Runner.run(Runner.create(), engine);

      const original = Render.world;
      Render.world = function(inst) {
        original(inst);
        const ctx = inst.context;
        dropBodies.forEach(body => {
          ctx.save();
          ctx.translate(body.position.x, body.position.y);
          ctx.rotate(body.angle);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          
          ctx.font = "bold 14px Pretendard";
          ctx.fillStyle = "#6d4d2e";
          ctx.fillText(body.labelText, 10, 2);
          
          ctx.font = "16px Arial";
          ctx.fillText(body.emoji, -((body.w/2)-18), 0);
          
          ctx.restore();
        });
      };
    }

    function createNameBody(label) {
      const w = Math.max(100, label.length * 12 + 50);
      const emoji = FOOD_EMOJIS[Math.floor(Math.random() * FOOD_EMOJIS.length)];
      const body = Matter.Bodies.rectangle(
        worldWidth/2 + (Math.random()-0.5)*120, -50, w, 40, 
        { chamfer: { radius: 18 }, restitution: 0.5, render: { fillStyle: "#ffd4a0", strokeStyle: "rgba(0,0,0,0.05)", lineWidth: 1 } }
      );
      body.labelText = label;
      body.emoji = emoji;
      body.w = w;
      dropBodies.push(body);
      Matter.Composite.add(engine.world, body);
    }

    async function loadData() {
      try {
        const res = await fetch(SHEET_CSV_URL + "&cb=" + Date.now());
        const text = await res.text();
        const lines = text.trim().split("\n").slice(1);
        els.soloList.innerHTML = "";
        dropBodies.forEach(b => Matter.Composite.remove(engine.world, b));
        dropBodies = [];
        
        lines.forEach((line, idx) => {
          const parts = line.split(",");
          // 구글 시트 구조에 맞추어 3번째 열(인덱스 2)에서 신청자 '닉네임(rawName)' 추출
          const name = parts[2]?.replace(/"/g, "").trim(); 
          const status = parts[7]?.replace(/"/g, "").trim();

          if (name && status === "active") {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = name; // 하단 현황판에 닉네임만 표시
            els.soloList.appendChild(chip);
            
            setTimeout(() => createNameBody(name), idx * 100); // 떨어지는 박스에 닉네임 연동
          }
        });
      } catch (err) { console.error("데이터 로드 실패", err); }
    }

    els.btnSubmit.onclick = async () => {
      const name = els.userName.value.trim();
      const topic = els.lunchTopic.value;
      if(!name) return alert("닉네임을 입력해주세요!");
      
      els.btnSubmit.disabled = true;
      els.submitNotice.textContent = "신청서를 보내는 중...";
      
      try {
        await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "submitPair", rawName1: name, rawName2: topic, groupCode: "TOPIC" })
        });
        els.submitNotice.className = "notice success";
        els.submitNotice.textContent = "신청 완료! 실시간 현황이 업데이트됩니다.";
        els.userName.value = "";
        setTimeout(loadData, 1000);
      } catch(e) {
        els.submitNotice.className = "notice error";
        els.submitNotice.textContent = "신청 중 오류가 발생했습니다.";
      } finally {
        els.btnSubmit.disabled = false;
      }
    };

    els.btnCancel.onclick = async () => {
      const name = els.cancelName.value.trim();
      if(!name) return alert("취소할 닉네임을 입력해주세요!");
      els.btnCancel.disabled = true;
      try {
        await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "cancel", rawName: name })
        });
        els.cancelNotice.textContent = "취소되었습니다.";
        els.cancelName.value = "";
        setTimeout(loadData, 1000);
      } catch(e) { els.cancelNotice.textContent = "오류 발생"; }
      finally { els.btnCancel.disabled = false; }
    };

    els.lunchTopic.onchange = updateDescription;
    window.onload = () => { initMatter(); loadData(); updateDescription(); };
  </script>
</body>
</html>
