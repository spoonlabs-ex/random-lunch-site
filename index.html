<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpoonLabs 랜덤런치 신청</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>

</head>

<body>

<script>

/**
 * 관리자 설정값
 */

const GAS_URL = "https://script.google.com/macros/s/AKfycbxrbz_FKnZSM3z--nzJwfqCqJ1Dj6F7ygUApyXqcR6n1Dvm4KMFtJdMIjdhE6Pi2K6PZw/exec";

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/1_dZyvNXT17ulxe5PsBhkJJ9rdns96V8UHClCm2OMf9g/gviz/tq?tqx=out:csv&sheet=entries";


/**
 * 아래 코드는 기존 코드 그대로 유지
 */

const GROUP_CODES = ["가","나","다","라","마","바","사","아","자","차","카","타","파","하"];

const FOOD_EMOJIS = ["🍔","🍕","🍣","🍜","🥗","🌮","🍙","🥪","🍗","🍤","🍩","🍪","🍎","🍊","🍇","🍰"];

let activeMode = "solo";

let engine;
let render;
let runner;

let worldWidth;
let worldHeight;

let dropBodies = [];

let droppedNames = new Set();

let lastRows = [];

function normalizeName(name){
return String(name || "").trim();
}

function parseCsvLine(line){

const out = [];
let current = "";
let inQuotes = false;

for (let i=0;i<line.length;i++){

const ch = line[i];

if(ch === '"'){

if(inQuotes && line[i+1] === '"'){
current += '"';
i++;
}else{
inQuotes = !inQuotes;
}

}else if(ch === "," && !inQuotes){

out.push(current);
current="";

}else{

current+=ch;

}

}

out.push(current);

return out;

}

function csvToObjects(csvText){

const lines = csvText.trim().split(/\r?\n/).filter(Boolean);

if(!lines.length) return [];

const headers = parseCsvLine(lines[0]).map(h=>h.trim());

return lines.slice(1).map(line=>{

const cells = parseCsvLine(line);

const obj={};

headers.forEach((header,index)=>{
obj[header]=(cells[index]||"").trim();
});

return obj;

});

}

async function loadRowsFromSheet(){

const response = await fetch(SHEET_CSV_URL + "&cacheBust=" + Date.now());

const text = await response.text();

return csvToObjects(text);

}

async function refreshBoard(){

const rows = await loadRowsFromSheet();

lastRows = rows;

}

async function postToGas(payload){

const response = await fetch(GAS_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify(payload)
});

const data = await response.json();

if(!data.success){

throw new Error(data.message || "요청 실패");

}

return data;

}

async function submitSolo(){

const rawName = normalizeName(document.getElementById("soloName").value);

if(!rawName){
alert("이름을 입력하세요");
return;
}

await postToGas({
action:"submitSolo",
rawName
});

alert("신청 완료");

refreshBoard();

}

async function submitPair(){

const rawName1 = normalizeName(document.getElementById("pairName1").value);
const rawName2 = normalizeName(document.getElementById("pairName2").value);

if(!rawName1 || !rawName2){

alert("두 이름 입력");

return;

}

const groupCode = GROUP_CODES[Math.floor(Math.random()*GROUP_CODES.length)];

await postToGas({
action:"submitPair",
rawName1,
rawName2,
groupCode
});

alert("같이 신청 완료");

refreshBoard();

}

async function cancelForm(){

const rawName = normalizeName(document.getElementById("cancelName").value);

await postToGas({
action:"cancel",
rawName
});

alert("취소 완료");

refreshBoard();

}

window.onload = function(){

refreshBoard();

}

</script>

</body>
</html>
